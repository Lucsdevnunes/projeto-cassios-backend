# Production Nginx Gateway & Proxy Configuration

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main_json escape=json '{'
        '"timestamp":"$time_iso8601",'
        '"client_ip":"$remote_addr",'
        '"forwarded_for":"$http_x_forwarded_for",'
        '"real_ip":"$http_x_real_ip",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access_log.json main_json;

    # Performance & Optimization settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # Hides Nginx version for security

    # 1. Protection Zone: Limit simultaneous connections per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # 2. Protection Zone: Rate limit requests (Edge DDoS fallback)
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=150r/s;

    upstream nestjs_api {
        server 127.0.0.1:3001; # Matches NestJS backend port
        keepalive 32;
    }

    server {
        listen 80;
        server_name api.emporiodo-ar.com.br;

        # Redirect all HTTP traffic to HTTPS (Cloudflare usually handles this, but good to have)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name api.emporiodo-ar.com.br;

        # SSL Configuration (Use your SSL certificates here)
        # ssl_certificate /etc/letsencrypt/live/api.emporiodo-ar.com.br/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/api.emporiodo-ar.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Apply connection limits to entire server block
        limit_conn addr_limit 20; # Max 20 simultaneous connections per IP

        # Apply rate limiting
        limit_req zone=req_limit burst=50 nodelay;

        # 3. Security Limits: Enforce max payload sizes
        client_max_body_size 50M; # Limit max request body size to 50MB (for base64 signatures/photos)
        client_body_buffer_size 128k;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        location / {
            proxy_pass http://nestjs_api;
            proxy_http_version 1.1;
            
            # Configure proxy connections
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            
            # 4. Proxy Real Client IP (Critical for NestJS throttler/logger)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static assets uploads caching optimization
        location /uploads/ {
            proxy_pass http://nestjs_api;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
